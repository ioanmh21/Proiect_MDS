name: Next.js 14 CI

on:
  push:
    branches: [ "**" ] 
  pull_request:
    branches: [ "**" ]

# SETARE IMPORTANTĂ: Forțăm toate comenzile 'run' să se execute în folderul learnflow
defaults:
  run:
    working-directory: ./learnflow

jobs:
  # ==========================================
  # JOB 1: Verificarea codului cu ESLint
  # ==========================================
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Descărcare cod sursă (Checkout)
        uses: actions/checkout@v4

      - name: Configurare Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Specificăm unde e fișierul de lock pentru cache
          cache-dependency-path: './learnflow/package-lock.json'

      - name: Instalare dependențe
        run: npm ci

      - name: Rulare ESLint
        run: npm run lint

  # ==========================================
  # JOB 2: Verificarea tipurilor (TypeScript)
  # ==========================================
  type-check:
    name: Type Check (tsc)
    runs-on: ubuntu-latest
    steps:
      - name: Descărcare cod sursă (Checkout)
        uses: actions/checkout@v4

      - name: Configurare Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './learnflow/package-lock.json'

      - name: Instalare dependențe
        run: npm ci

      - name: Verificarea tipurilor TypeScript
        run: npx tsc --noEmit

  # ==========================================
  # JOB 3: Build Next.js
  # ==========================================
  build:
    name: Build (Next Build)
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    steps:
      - name: Descărcare cod sursă (Checkout)
        uses: actions/checkout@v4

      - name: Configurare Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './learnflow/package-lock.json'

      - name: Instalare dependențe
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/learnflow/.next/cache
          # Căutăm doar fișierele din learnflow pentru a invalida cache-ul
          key: ${{ runner.os }}-nextjs-${{ hashFiles('learnflow/package-lock.json') }}-${{ hashFiles('learnflow/**/*.[jt]s', 'learnflow/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('learnflow/package-lock.json') }}-

      - name: Creare Build (Next.js)
        run: npm run build
